specificationVersion: '0.19'
description: >-
  Landbot is a no-code conversational AI platform that enables businesses to build, deploy,
  and manage chatbots across web, WhatsApp, and messenger channels without requiring programming
  skills. The platform provides a REST API at api.landbot.io/v1 for programmatic control
  of channels, customers, customer fields, message hooks, and webhooks. Developers can use
  token-based authentication to integrate Landbot bots into external systems and retrieve
  conversation data in real time. Landbot also offers an APIchat interface for embedding
  chat interactions directly into custom applications. The platform supports webhooks for
  event-driven automation and provides SDKs and code samples for Shell, Ruby, Node.js, PHP,
  and Python.
tags:
  - chatbot
  - conversational AI
  - no-code
  - WhatsApp
  - webhooks
  - messaging
  - automation

apis:
  - name: Landbot Platform API
    description: >-
      REST API for managing Landbot resources including channels, customers, customer fields,
      message hooks, webhooks, and WhatsApp templates. Token-based authentication using an
      agent token from account settings.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://dev.landbot.io/api-reference/platform
    baseURL: https://api.landbot.io/v1
    tags:
      - chatbot
      - channels
      - customers
      - webhooks
      - WhatsApp
    properties:
      - type: Documentation
        url: https://dev.landbot.io/api-reference/platform
